<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LastApp — Coming Soon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #faf8f5;
            color: #1a1a1a;
            overflow: hidden;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(227, 120, 47, .12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            translate: -50% -50%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            padding: 2rem;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: .05em;
            color: #e3782f;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -.03em;
            line-height: 1.1;
            margin-bottom: 1.25rem;
            color: #1a1a1a;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: #78716c;
            max-width: 420px;
            margin: 0 auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="logo">LastApp</div>
        <h1>Coming Soon</h1>
        <p>One app to replace them all.</p>
        <p>Task management, habits, workouts, and more - all in one place.</p>
    </div>
</body>
</html>
